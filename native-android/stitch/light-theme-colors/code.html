<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-tertiary-fixed-variant": "#41208e",
            "on-background": "#1a1b22",
            "primary": "#10b981",
            "on-tertiary": "#ffffff",
            "on-secondary-fixed-variant": "#454748",
            "surface-container-lowest": "#ffffff",
            "on-primary-container": "#00422b",
            "inverse-primary": "#4edea3",
            "on-primary-fixed-variant": "#005236",
            "error": "#ba1a1a",
            "surface": "#fbf8ff",
            "secondary-container": "#dfdfe0",
            "outline-variant": "#e2e2e3",
            "on-tertiary-container": "#711419",
            "background": "#ffffff",
            "primary-fixed": "#6ffbbe",
            "on-secondary-fixed": "#1a1c1d",
            "error-container": "#ffdad6",
            "on-secondary": "#ffffff",
            "tertiary": "#a43a3a",
            "surface-variant": "#e3e1ec",
            "tertiary-fixed": "#ffdad7",
            "surface-dim": "#dad9e3",
            "surface-container": "#eeedf7",
            "secondary-fixed-dim": "#c6c6c7",
            "surface-bright": "#fbf8ff",
            "outline": "#6c7a71",
            "surface-container-high": "#e8e7f1",
            "on-error": "#ffffff",
            "on-primary-fixed": "#002113",
            "on-secondary-container": "#616364",
            "tertiary-fixed-dim": "#ffb3af",
            "surface-container-highest": "#e3e1ec",
            "primary-container": "#10b981",
            "secondary": "#5d5e60",
            "on-surface": "#1a1b22",
            "primary-fixed-dim": "#4edea3",
            "surface-tint": "#006c49",
            "on-primary": "#ffffff",
            "surface-container-low": "#f4f2fd",
            "inverse-on-surface": "#f1effa",
            "on-error-container": "#93000a",
            "on-tertiary-fixed": "#410005",
            "inverse-surface": "#2f3038"
          },
          "borderRadius": {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"],
            "mono": ["JetBrains Mono"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .grid-line-h {
      height: 1px;
      width: 100%;
      background: rgba(0, 0, 0, 0.1);
    }
    .grid-line-v {
      width: 1px;
      height: 100%;
      background: rgba(0, 0, 0, 0.1);
    }
    body {
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Top Navigation -->
<header class="relative z-50 flex items-center justify-between px-4 h-14 shrink-0 mt-2">
<div class="flex items-center">
<button class="p-2 text-primary bg-white/80 backdrop-blur-md border border-black/5 hover:bg-gray-100 transition-colors rounded-full active:scale-95 shadow-sm">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
<nav class="flex items-center bg-white/80 backdrop-blur-md rounded-full p-1 border border-black/5 shadow-sm">
<button class="px-3 py-1 font-mono text-[10px] tracking-widest text-secondary hover:text-on-surface transition-all">1:1</button>
<button class="px-3 py-1 font-mono text-[10px] tracking-widest text-white bg-primary rounded-full shadow-sm">4:3</button>
<button class="px-3 py-1 font-mono text-[10px] tracking-widest text-secondary hover:text-on-surface transition-all">16:9</button>
</nav>
<div class="flex items-center">
<button class="p-2 text-primary bg-white/80 backdrop-blur-md border border-black/5 hover:bg-gray-100 transition-colors rounded-full active:scale-95 shadow-sm">
<span class="material-symbols-outlined" data-icon="flip_camera_ios">flip_camera_ios</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center min-h-0 px-4 gap-4">
<!-- Camera Preview -->
<div class="relative aspect-square w-full max-w-[min(85vw,500px)] max-h-[45vh] bg-surface-container-low overflow-hidden rounded-2xl shadow-xl border border-black/5 shrink-1">
<img class="w-full h-full object-cover contrast-110" data-alt="High-end fashion sneaker on a minimalist concrete pedestal" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9QZ-isN0PU2oOq9RquRRaHw4SEa6vuqKfVrip1inJjGBP1_MyAlbscmFx8IUE2Oynz72-YKlCXZlFv7crZPu9Tuz7TxgA18wMm5tkEBUiPcmor0k_sFDhZDvJI8uVQQfuUWf0XQVLqo0SG36AAkyB_hDNO0ziJ2IItoa2yBrNnI78AUpLlBpwkipD8sKb2dzEsyqkpO22__Pxrcw2XANZcke68xt3zB6W_8zhpGfW2-flO_BMC1ljZIamnG2vxWLDOEBo0ssna6gs"/>
<!-- 3x3 Grid Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-50">
<div class="absolute top-1/3 left-0 grid-line-h"></div>
<div class="absolute top-2/3 left-0 grid-line-h"></div>
<div class="absolute left-1/3 top-0 grid-line-v"></div>
<div class="absolute left-2/3 top-0 grid-line-v"></div>
</div>
<!-- AI HUD -->
<div class="absolute bottom-3 left-3 right-3 bg-white/80 backdrop-blur-md rounded-lg p-2 border border-black/5 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="font-mono text-[9px] uppercase tracking-tighter text-secondary">AI Detecting...</span>
</div>
<span class="font-mono text-[9px] text-primary font-bold">OBJECT_FOCUSED</span>
</div>
</div>
<!-- Controls Section -->
<div class="w-full max-w-xs flex flex-col items-center gap-4 py-2">
<!-- Zoom Presets -->
<div class="flex items-center gap-4 bg-white/80 backdrop-blur-sm px-3 py-1.5 rounded-full border border-black/5 shadow-sm">
<button class="font-mono text-[10px] text-secondary hover:text-primary">.5</button>
<button class="font-mono text-[10px] text-white bg-primary rounded-full w-7 h-7 flex items-center justify-center">1x</button>
<button class="font-mono text-[10px] text-secondary hover:text-primary">2</button>
<button class="font-mono text-[10px] text-secondary hover:text-primary">5</button>
</div>
<!-- Zoom Slider Interface -->
<div class="w-full px-4">
<div class="flex justify-between items-center mb-2">
<span class="font-mono text-[10px] text-secondary uppercase font-semibold">Auto</span>
<span class="font-mono text-lg font-bold text-on-surface">1.0<span class="text-[10px] font-normal text-secondary ml-1">X</span></span>
<span class="font-mono text-[10px] text-secondary uppercase font-semibold">Wide</span>
</div>
<div class="h-1 w-full bg-surface-container-high rounded-full relative">
<div class="absolute left-0 top-0 h-full w-1/3 bg-primary rounded-full"></div>
<div class="absolute left-1/3 -top-1.5 w-4 h-4 bg-on-surface rounded-full shadow-md border-2 border-white"></div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="shrink-0 flex flex-col gap-2 pb-6 pt-2 bg-white/50 backdrop-blur-sm border-t border-black/[0.03]">
<!-- Main Shutter Row -->
<div class="flex justify-between items-center px-8 mt-2">
<!-- Gallery Thumbnail -->
<div class="flex flex-col items-center gap-1 group cursor-pointer w-12">
<div class="w-11 h-11 rounded-xl bg-surface-container border border-black/5 flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Last photo thumbnail" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGSnFGtyvui9-LnnZP6II2tC_u9cTtKys2RIczJxQlaZ6fr_7ISUR3h-TzNR6HcHcbb3ofeqJAtu-1jM0Vl6Qt6NMMmtEF6V--rx5kAuG0PppWXc0xN4IFgp3eYwIzwFjZVbXtOVD-2-q2Tex751a78oMJw4kjodEeSNgLyqx0nRCtb6o-YxuWwygMrZxUEdqjhrVoBlxGBMEsFPAJlfQsr523O6Tm6CFKWiz4CW_3KiaZyLZd_WrXcWEKdN9dz3WxhDuW1dCojvsh"/>
</div>
<span class="font-mono text-[8px] text-secondary font-bold">12 / 24</span>
</div>
<!-- Main Shutter Button -->
<div class="relative flex items-center justify-center">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full scale-150"></div>
<button class="w-16 h-16 rounded-full border-4 border-on-surface bg-transparent p-1 transition-transform active:scale-95 duration-75 relative z-10">
<div class="w-full h-full rounded-full bg-on-surface flex items-center justify-center">
<div class="w-10 h-10 rounded-full border border-white/20"></div>
</div>
</button>
</div>
<!-- Process/Forward Arrow -->
<div class="w-12 flex justify-end">
<button class="w-11 h-11 rounded-full bg-gradient-to-br from-primary to-[#06b77f] flex items-center justify-center text-white shadow-lg shadow-primary/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl font-bold" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</footer>
</body></html>
